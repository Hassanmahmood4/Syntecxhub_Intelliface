<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intelliface — Face Detection & Recognition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #18181c;
      --border: #2a2a30;
      --text: #e4e4e7;
      --muted: #71717a;
      --accent: #a78bfa;
      --accent-dim: #7c3aed;
      --success: #34d399;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(124, 58, 237, 0.15), transparent);
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.25rem 0;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      padding: 1.5rem;
    }
    .view-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      max-height: 70vh;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }
    #videoEl {
      display: none;
    }
    #output {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #111;
      z-index: 2;
    }
    .view-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.95rem;
      gap: 0.5rem;
    }
    .view-placeholder.hidden { display: none; }
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }
    button {
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.65rem 1.4rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    button:active { transform: scale(0.98); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
      color: #fff;
    }
    .btn-primary:hover { box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4); }
    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }
    .btn-secondary:hover { background: #3f3f46; }
    .btn-register {
      background: var(--surface);
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .btn-register:hover:not(:disabled) { background: rgba(167, 139, 250, 0.15); }
    .btn-register:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }
    .status.live { color: var(--success); }
    .error-msg {
      color: var(--danger);
      font-size: 0.9rem;
      margin-top: 0.75rem;
    }
    .mirror-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: var(--muted);
      cursor: pointer;
    }
    .mirror-option input { cursor: pointer; }
    .view-placeholder .hint { font-size: 0.75rem; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Intelliface</h1>
      <p class="subtitle">Face detection & recognition</p>
    </header>
    <div class="card">
      <div class="view-wrap">
        <video id="videoEl" autoplay playsinline muted></video>
        <img id="output" alt="Live view" />
        <div class="view-placeholder" id="placeholder">
          <span>Click “Start camera” to begin</span>
        </div>
      </div>
      <div class="controls">
        <button type="button" class="btn-primary" id="btnStart">Start camera</button>
        <button type="button" class="btn-secondary" id="btnStop" disabled>Stop</button>
        <button type="button" class="btn-register" id="btnRegister" disabled title="Start camera first">Register face</button>
        <label class="mirror-option">
          <input type="checkbox" id="mirrorCheck" checked />
          <span>Mirror view (selfie)</span>
        </label>
      </div>
      <p class="status" id="status"></p>
      <p class="error-msg" id="error"></p>
    </div>
  </div>

  <script>
    const videoEl = document.getElementById('videoEl');
    const outputEl = document.getElementById('output');
    const placeholder = document.getElementById('placeholder');
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');
    const mirrorCheck = document.getElementById('mirrorCheck');
    const btnRegister = document.getElementById('btnRegister');

    let stream = null;
    let intervalId = null;
    const FPS = 5;
    const captureInterval = 1000 / FPS;

    const canvas = document.createElement('canvas');

    function clearError() {
      errorEl.textContent = '';
    }

    function showError(msg) {
      errorEl.textContent = msg;
    }

    async function startCamera() {
      clearError();
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        videoEl.srcObject = stream;
        placeholder.classList.add('hidden');
        outputEl.style.display = 'block';
        outputEl.src = '';
        btnStart.disabled = true;
        btnStop.disabled = false;
        btnRegister.disabled = false;
        statusEl.textContent = 'Starting…';
        statusEl.classList.remove('live');

        const track = stream.getVideoTracks()[0];
        const settings = track.getSettings();
        canvas.width = settings.width || 640;
        canvas.height = settings.height || 480;

        intervalId = setInterval(sendFrame, captureInterval);
        statusEl.textContent = 'Live';
        statusEl.classList.add('live');
      } catch (e) {
        showError('Could not access camera: ' + (e.message || e.name));
        statusEl.textContent = '';
      }
    }

    function stopCamera() {
      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      }
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      videoEl.srcObject = null;
      videoEl.style.display = 'none';
      // Clear output immediately so no boxes/video remain when camera is off
      outputEl.src = '';
      outputEl.style.display = 'none';
      placeholder.classList.remove('hidden');
      btnStart.disabled = false;
      btnStop.disabled = true;
      btnRegister.disabled = true;
      statusEl.textContent = '';
      statusEl.classList.remove('live');
    }

    function registerFace() {
      if (!stream || videoEl.readyState < 2) {
        showError('Start the camera first.');
        return;
      }
      const name = prompt('Enter name for this face:');
      if (!name || !name.trim()) return;
      clearError();
      const ctx = canvas.getContext('2d');
      ctx.drawImage(videoEl, 0, 0);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
      fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ frame: dataUrl, name: name.trim() })
      })
        .then(r => r.json())
        .then(data => {
          if (data.error) {
            showError(data.error);
            return;
          }
          statusEl.textContent = 'Registered: ' + (data.name || name);
          statusEl.classList.remove('live');
        })
        .catch(() => showError('Network error'));
    }

    function sendFrame() {
      if (!stream || videoEl.readyState < 2) return;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(videoEl, 0, 0);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
      fetch('/api/process', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          frame: dataUrl,
          mirror: mirrorCheck ? mirrorCheck.checked : true
        })
      })
        .then(r => {
          if (!r.ok) throw new Error('Server error ' + r.status);
          return r.json();
        })
        .then(data => {
          if (data.error) {
            showError(data.error);
            return;
          }
          if (data.image && stream) {
            outputEl.src = data.image;
          }
        })
        .catch(err => { if (stream) showError(err.message || 'Network error'); });
    }
    btnStart.addEventListener('click', startCamera);
    btnStop.addEventListener('click', stopCamera);
    btnRegister.addEventListener('click', registerFace);
  </script>
</body>
</html>
